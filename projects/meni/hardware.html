<style>
/* ─── Teenage Engineering design tokens ─── */
:root {
  --te-o: #F0621F;
  --te-k: #0f0f0f;
  --te-g: #7a7a7a;
  --te-r: #d8d8d8;
}

/* section rule */
.hw-rule {
  display: flex;
  align-items: center;
  gap: 14px;
  border-top: 1px solid var(--te-r);
  padding-top: 10px;
  margin: clamp(40px,7vw,72px) 0 clamp(24px,4vw,40px);
}
.hw-rule-label {
  font-size: 9px;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--te-g);
  white-space: nowrap;
}
.hw-rule-index {
  font-size: 9px;
  letter-spacing: .1em;
  color: var(--te-o);
}

/* ── hero ── */
.hw-hero {
  margin: clamp(24px,5vw,48px) 0 0;
  display: grid;
  grid-template-columns: 1.05fr 1fr;
  gap: clamp(24px,4vw,48px);
  align-items: start;
}
.hw-hero-img {
  display: flex;
  align-items: center;
  justify-content: center;
}
.hw-hero-img img {
  width: 75%;
  max-height: 560px;
  object-fit: contain;
  display: block;
}

/* ── hero component stack (right col) ── */
.hw-hero-comps {
  display: flex;
  flex-direction: column;
  border: 1px solid var(--te-r);
}
.hw-hero-text {}
.hw-hero-eyebrow {
  font-size: 9px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--te-g);
  margin-bottom: 16px;
  display: block;
}
.hw-hero-title {
  font-size: clamp(36px,6vw,60px);
  font-weight: 300;
  color: var(--te-k);
  letter-spacing: -.02em;
  line-height: .95;
  margin-bottom: 24px;
}
.hw-hero-title em {
  font-style: normal;
  color: var(--te-o);
}
.hw-hero-desc {
  font-size: 11px;
  color: var(--te-g);
  line-height: 1.8;
  letter-spacing: .04em;
  margin-bottom: 24px;
}
.hw-hero-meta {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.hw-meta-row {
  display: flex;
  gap: 12px;
}
.hw-meta-key {
  font-size: 8.5px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--te-r);
  min-width: 60px;
}
.hw-meta-val {
  font-size: 8.5px;
  letter-spacing: .06em;
  color: var(--te-g);
}

/* ── component card (shared) ── */
.hw-comp {
  display: flex;
  flex-direction: column;
}
/* hero stack variant — rows separated by border */
.hw-hero-comps .hw-comp {
  flex-direction: row;
  align-items: center;
  border-bottom: 1px solid var(--te-r);
  gap: 0;
}
.hw-hero-comps .hw-comp:last-child { border-bottom: none; }
.hw-hero-comps .hw-comp-img {
  width: 160px;
  height: 160px;
  flex-shrink: 0;
  border-right: 1px solid var(--te-r);
  padding: 16px;
  background: #fefefe;
  display: flex;
  align-items: center;
  justify-content: center;
}
.hw-hero-comps .hw-comp-img img {
  max-width: 100%;
  max-height: 128px;
  object-fit: contain;
  display: block;
}
.hw-hero-comps .hw-comp-body {
  flex: 1;
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.hw-comp-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  max-width: 240px;
}
.hw-comp-num {
  font-size: 36px;
  font-weight: 300;
  color: var(--te-k);
  line-height: 1;
  letter-spacing: -.02em;
}
.hw-comp-tag {
  font-size: 8.5px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--te-g);
}
.hw-comp-name {
  display: block;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .05em;
  color: var(--te-k);
  margin-bottom: 2px;
}
.hw-comp-spec {
  display: block;
  font-size: 8px;
  letter-spacing: .06em;
  color: var(--te-g);
  text-transform: uppercase;
}

/* ── process — editorial stacked ── */
.hw-proc-item {
  margin-top: clamp(32px,5vw,56px);
  display: grid;
  grid-template-columns: 80px 1fr;
  gap: 0 clamp(20px,3vw,36px);
  align-items: start;
}
.hw-proc-meta {
  padding-top: 4px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.hw-proc-ver {
  font-size: 9px;
  letter-spacing: .1em;
  color: var(--te-o);
  text-transform: uppercase;
}
.hw-proc-label {
  font-size: 9px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--te-g);
  writing-mode: vertical-rl;
  transform: rotate(180deg);
  white-space: nowrap;
  margin-top: 8px;
}
.hw-proc-img-wrap {
  overflow: hidden;
  height: clamp(300px, 42vw, 460px);
}
.hw-proc-img-wrap img {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: cover;
}
@media (max-width: 580px) {
  .hw-proc-item { grid-template-columns: 1fr; }
  .hw-proc-label { writing-mode: horizontal-tb; transform: none; margin-top: 0; }
}

/* responsive: stack on narrow */
@media (max-width: 580px) {
  .hw-hero { grid-template-columns: 1fr; }
  .hw-process { grid-template-columns: 1fr; }
}
</style>
</head>
